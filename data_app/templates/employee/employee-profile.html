{% extends 'master/base.html' %}

{% block body %}
  <title>Employee | Profile</title>
  <h1>{{emp.name}}</h1>
  <div class="card mb-3">
    <img src="/{{emp.picture}}" class="card-img-top" alt="..." />
    <div class="card-body">
      <h5 class="card-title">{{emp.name}}</h5>
      <h6 class="card-title">{{emp.email}}</h6>
      <h6 class="card-title">{{emp.phone}}</h6>
      <h6 class="card-title">{{emp.city}}</h6>
      <a href="{% url 'employee_list' %}" class="btn btn-primary">Full List</a>
    </div>
  </div>
{% endblock %}
