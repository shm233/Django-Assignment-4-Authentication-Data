{% extends 'master/base.html' %}

{% block body %}
  <title>Add | Student</title>

  <h1>Add Student</h1>
  <form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label for="name" class="form-label">Student Name</label>
      <input name="name" value="{{ student.student_name }}" type="text" class="form-control" id="name" placeholder="Please Enter Your Name" required />
    </div>
    <div class="mb-3">
      <label for="name" class="form-label">Student Roll Number</label>
      <input name="roll_number" value="{{ student.roll_number }}" type="text" class="form-control" id="name" placeholder="Please Enter Your Roll Number" required />
    </div>
    <div class="mb-3">
      <label for="name" class="form-label">Student Email</label>
      <input name="email" value="{{ student.email }}" type="email" class="form-control" id="name" placeholder="Please Enter Your Email Address" required />
    </div>
    <div class="mb-3">
      <label for="name" class="form-label">Course Name</label>
      <input name="course" value="{{ student.course }}" type="text" class="form-control" id="name" placeholder="Please Enter Your Course Name" required />
    </div>
    <div class="mb-3">
      <label for="department" class="form-label">Year</label>
      <select name="year" class="form-select" id="department" aria-label="Default select example" required>
        <option selected>Open this select menu</option>
        <option value="1st" 
        {% if student.year == "1st" %}
            selected
        {% endif %}
            >1st Year</option>
        <option value="2nd" 
        {% if student.year == "2nd" %}
            selected
        {% endif %}
            >2nd Year</option>
        <option value="3rd" 
        {% if student.year == "3rd" %}
            selected
        {% endif %}
            >3rd Year</option>
        <option value="4th" 
        {% if student.year == "4th" %}
            selected
        {% endif %}
            >4th Year</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="department" class="form-label">Semester</label>
      <select name="semester" class="form-select" id="department" aria-label="Default select example" required>
        <option selected>Open this select menu</option>
        <option value="1st" 
        {% if student.semester == "1st" %}
            selected
        {% endif %}
            >1st Semester</option>
        <option value="2nd" 
        {% if student.semester == "2nd" %}
            selected
        {% endif %}
            >2nd Semester</option>
        <option value="3rd" 
        {% if student.semester == "3rd" %}
            selected
        {% endif %}
            >3rd Semester</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Add Student</button>
  </form>
{% endblock %}
