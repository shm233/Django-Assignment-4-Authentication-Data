{% extends 'master/base.html' %}

{% block body %}
  <title>Add | Product</title>

  <h1>Add Product</h1>
  <form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label for="name" class="form-label">Product Name</label>
      <input name="name" type="text" class="form-control" id="name" placeholder="Please Enter Your Name" required />
    </div>
    <div class="mb-3">
      <label for="department" class="form-label">Category</label>
      <select name="category" class="form-select" id="department" aria-label="Default select example" required>
        <option selected>Open this select menu</option>
        <option value="clothing">Clothing</option>
        <option value="electronics">Electronics</option>
        <option value="sports">Sports</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Price</label>
      <input name="price" type="number" class="form-control" id="email" placeholder="Please Enter Your Price" required />
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label">Quantity</label>
      <input name="quantity" type="number" class="form-control" id="phone" placeholder="Input Quantity" required />
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea name="description" class="form-control" id="description"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Add Product</button>
  </form>
{% endblock %}
