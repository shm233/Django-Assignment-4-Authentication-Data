<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      body {
        height: 100vh;
        display: flex;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: #fff;
        overflow: hidden;
      }
      
      /* Sidebar */
      .sidebar {
        width: 240px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        border-right: 1px solid rgba(255, 255, 255, 0.15);
        padding: 20px;
      }
      
      .logo {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 30px;
        text-align: center;
        letter-spacing: 1px;
      }
      
      .menu {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      
      .menu a {
        text-decoration: none;
        color: #fff;
        padding: 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        transition: 0.3s;
        font-size: 14px;
      }
      
      .menu a:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateX(5px);
      }
      
      /* Main content */
      .main {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }
      
      /* Topbar */
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      
      .topbar h2 {
        font-size: 24px;
        letter-spacing: 1px;
      }
      
      .profile {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }
      
      .profile:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      
      .avatar {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6ec4, #7873f5);
      }
      
      /* Cards */
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }
      
      .card {
        padding: 20px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        transition: 0.3s;
      }
      
      .card:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.15);
      }
      
      .card h3 {
        font-size: 16px;
        margin-bottom: 10px;
        opacity: 0.9;
      }
      
      .card p {
        font-size: 22px;
        font-weight: bold;
        color: #00c6ff;
      }
      
      /* Section */
      .section {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
      }
      
      .section h3 {
        margin-bottom: 10px;
      }
      
      .section p {
        font-size: 14px;
        opacity: 0.8;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">MyDashboard</div>

      <div class="menu">
        <a href="{% url 'employee_list' %}">🏠 Employee</a>
        <a href="{% url 'product_list' %}">📊 Products</a>
        <a href="{% url 'student_list' %}">👤 Students</a>
        <a href="{% url 'sign_out' %}">🚪 Logout</a>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Topbar -->
      <div class="topbar">
        <h2>Dashboard</h2>

        <div class="profile">
          <div class="avatar"></div>
          <span>User</span>
        </div>
      </div>

      <!-- Cards -->
      <div class="cards">
        <div class="card">
          <h3>Total Users</h3>
          <p>1,245</p>
        </div>

        <div class="card">
          <h3>Revenue</h3>
          <p>$8,540</p>
        </div>

        <div class="card">
          <h3>Orders</h3>
          <p>320</p>
        </div>

        <div class="card">
          <h3>Visitors</h3>
          <p>12,300</p>
        </div>
      </div>

      <!-- Section -->
      <div class="section">
        <h3>Welcome Back 👋</h3>
        <p>This is your modern dashboard panel.</p>
      </div>
    </div>
  </body>
</html>
